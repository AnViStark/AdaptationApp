{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Targem Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/targem-tokens.css' %}">
</head>
<body>
<div class="login-page">
    <div>
        <div class="login-card">
            <div class="login-logo">
                <svg width="32" height="32" viewBox="0 0 24 24">
                    <polygon points="12,2 22,8 22,16 12,22 2,16 2,8" fill="#4DD8E8"/>
                    <polygon points="12,6.5 18,10 18,14 12,17.5 6,14 6,10" fill="#fff"/>
                    <circle cx="12" cy="12" r="2.2" fill="#4DD8E8"/>
                </svg>
                <span class="login-logo-name">TARGEM</span>
                <span class="login-logo-sub">GAMES</span>
            </div>
            <p class="login-subtitle">Система адаптации сотрудников</p>

            {% if error %}
                <div class="login-error">{{ error }}</div>
            {% endif %}

            <form method="post" novalidate>
                {% csrf_token %}
                <div style="margin-bottom: 16px;">
                    <label for="email" class="login-label">Email</label>
                    <input type="email" class="field" id="email" name="email"
                           required autofocus autocomplete="email" placeholder="name@targem.ru">
                </div>
                <div style="margin-bottom: 24px;">
                    <label for="password" class="login-label">Пароль</label>
                    <input type="password" class="field" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn--primary btn--full">Войти</button>
            </form>
        </div>
        <p class="login-footer">© Targem Games — внутренний ресурс</p>
    </div>
</div>
</body>
</html>
