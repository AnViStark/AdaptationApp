{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Targem Games</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
</head>
<body class="login-body">
    <div class="login-wrapper">
        <div class="login-card shadow-lg">
            <div class="text-center mb-4">
                <i class="bi bi-joystick login-logo-icon"></i>
                <h1 class="login-title">Targem Games</h1>
                <p class="login-subtitle">Система адаптации сотрудников</p>
            </div>
            <form method="post" novalidate>
                {% csrf_token %}
                {% if error %}
                    <div class="alert alert-danger py-2">{{ error }}</div>
                {% endif %}
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control form-control-lg" id="email" name="email"
                           required autofocus autocomplete="email" placeholder="name@targem.ru">
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Пароль</label>
                    <input type="password" class="form-control form-control-lg" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Войти
                </button>
            </form>
        </div>
        <p class="text-center text-muted mt-3 small">© Targem Games — внутренний ресурс</p>
    </div>
</body>
</html>
