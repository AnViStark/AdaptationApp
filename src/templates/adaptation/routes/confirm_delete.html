{% extends 'base.html' %}

{% block title %}Удаление — Targem Games{% endblock %}

{% block content %}
<div class="card shadow-sm" style="max-width: 520px; margin: 4rem auto;">
    <div class="card-body p-4 text-center">
        <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 3rem;"></i>
        <h4 class="mt-3 mb-2">Подтвердите удаление</h4>
        <p class="text-muted mb-4">Вы уверены, что хотите удалить <strong>«{{ object_name }}»</strong>? Это действие нельзя отменить.</p>
        <form method="post" class="d-flex justify-content-center gap-3">
            {% csrf_token %}
            <a href="{{ cancel_url }}" class="btn btn-outline-secondary">
                <i class="bi bi-x-lg me-1"></i>Отмена
            </a>
            <button type="submit" class="btn btn-danger">
                <i class="bi bi-trash-fill me-1"></i>Удалить
            </button>
        </form>
    </div>
</div>
{% endblock %}
