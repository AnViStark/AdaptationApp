{% extends 'base.html' %}
{% block title %}Удаление статьи — База знаний{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body p-4 text-center">
                <i class="bi bi-exclamation-triangle-fill text-danger fs-1 mb-3"></i>
                <h4 class="mb-2">Удалить статью?</h4>
                <p class="text-muted mb-4">
                    Статья «<strong>{{ article.title }}</strong>» будет удалена навсегда.
                    Это действие необратимо.
                </p>
                <div class="d-flex gap-2 justify-content-center">
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash me-1"></i>Да, удалить
                        </button>
                    </form>
                    <a href="{% url 'knowledge:article' slug=article.slug %}" class="btn btn-outline-secondary">Отмена</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
